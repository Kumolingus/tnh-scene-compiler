# Operations callable from [[run]] inside a .scene file.
# These write persistent state (Character traits, History, mod
# attributes) and must be hand-maintained: adding an entry here
# exposes the helper to non-dev writers, and the mod commits to
# keeping its signature stable across releases.
#
# Each entry's ``name`` is matched against the call target used in
# [[run]] — either the bare function name (``mymod_set_stage``)
# or the final attribute of a dotted method chain
# (``JeanGrey.give_trait("x")`` matches ``give_trait``).
#
# Example:
# operations:
#   - name: give_trait
#     signature: "<Character>.give_trait(trait_name: str)"
#     source_file: TheNullHypothesis/game/core/base/character.rpy
operations: []
