name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: .exe
          - os: ubuntu-latest
            suffix: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install pyyaml pyinstaller tkinterdnd2

      - name: Get version
        id: version
        run: python -c "from tnh_scene_compiler import __version__; print(f'value={__version__}')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build executable
        run: pyinstaller tnh_scene_compiler.spec

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-${{ matrix.os }}
          path: dist/TNHSceneCompiler-${{ steps.version.outputs.value }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ github.ref_name }}
          artifacts/build-windows-latest/*
          artifacts/build-ubuntu-latest/*
          --repo ${{ github.repository }}
          --title "${{ github.ref_name }}"
          --generate-notes
